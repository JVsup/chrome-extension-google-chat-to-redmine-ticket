stages:
  - build

build-release:
  stage: build
  image: node:20-alpine
  script:
    - |
      set -e

      apk add --no-cache zip

      echo "[Build] Preparing extension files for release..."

      EXT_VERSION="${CI_COMMIT_TAG#v}"
      echo "[Build] Target version resolved to: $EXT_VERSION"

      echo "[Build] Validating required environment variables..."
      test -n "$EXTENSION_PRIVATE_KEY" || { echo "[Build] ERROR: EXTENSION_PRIVATE_KEY is empty or not set"; exit 1; }
      test -n "$EXTENSION_ID" || { echo "[Build] ERROR: EXTENSION_ID is empty or not set"; exit 1; }
      test -n "$EXT_VERSION" || { echo "[Build] ERROR: EXT_VERSION is empty"; exit 1; }

      mkdir -p dist

      # Copy only necessary files
      cp manifest.json background.js content.js content.css options.html options.js README.md LICENSE dist/
      cp icon*.png dist/

      # Dynamically inject the correct version into manifest.json
      sed -i "s/\"version\": \".*\"/\"version\": \"$EXT_VERSION\"/" dist/manifest.json

      echo "[Build] Generating physical PEM file from environment variable..."
      printf '%s\n' "$EXTENSION_PRIVATE_KEY" > extension.pem

      echo "[Build] Generating signed CRXv3 package..."
      npx crx3 -p extension.pem -o chat-to-redmine.crx -- dist/

      echo "[Build] Verifying generated CRX file..."
      test -f chat-to-redmine.crx || { echo "[Build] ERROR: chat-to-redmine.crx was not created"; exit 1; }

      echo "[Build] Generating update.xml..."
      cat > update.xml <<EOF
      <?xml version='1.0' encoding='UTF-8'?>
      <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
        <app appid='$EXTENSION_ID'>
          <updatecheck codebase='https://extension.leris.cz/chat-to-redmine.crx' version='$EXT_VERSION' />
        </app>
      </gupdate>
      EOF

      echo "[Build] Generating ZIP archive..."
      cd dist
      zip -r ../chat-to-redmine.zip .
      cd ..
      echo "[Build] Verifying generated ZIP file..."
      test -f chat-to-redmine.zip || { echo "[Build] ERROR: chat-to-redmine.zip was not created"; exit 1; }

  artifacts:
    name: "extension-release-$CI_COMMIT_TAG"
    paths:
      - chat-to-redmine.crx
      - chat-to-redmine.zip
      - update.xml
    expire_in: never

  only:
    - tags