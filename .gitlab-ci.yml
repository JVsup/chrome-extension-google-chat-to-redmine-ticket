stages:
  - build

build-chrome-extension:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - echo "Building Chrome Extension version $CI_COMMIT_TAG"
    # Create a zip archive containing only the necessary files
    - zip -r chat-to-redmine-$CI_COMMIT_TAG.zip manifest.json background.js content.js content.css options.html options.js icon16.png icon48.png icon128.png README.md LICENSE
  artifacts:
    name: "chat-to-redmine-$CI_COMMIT_TAG"
    paths:
      - chat-to-redmine-$CI_COMMIT_TAG.zip
    expire_in: 1 month
  only:
    - tags